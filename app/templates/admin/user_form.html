<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>{% if user %}Modifier l'utilisateur{% else %}Nouvel utilisateur{% endif %} — OPTILAB</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:#f0f4f8; }
        .card { background:#fff; border-radius:12px; box-shadow:0 4px 24px rgba(0,0,0,.1); padding:2rem; width:100%; max-width:440px; }
        h2 { color:#1e3a5f; margin:0 0 .4rem; }
        .subtitle { color:#64748b; font-size:.85rem; margin:0 0 1.5rem; }
        .form-group { margin-bottom:1rem; }
        label { display:block; font-size:.85rem; font-weight:600; color:#374151; margin-bottom:.35rem; }
        .label-hint { font-weight:400; color:#94a3b8; margin-left:.4rem; }
        input, select { width:100%; padding:.65rem .9rem; border:1.5px solid #d1d5db; border-radius:8px; font-size:.95rem; box-sizing:border-box; }
        input:focus, select:focus { outline:none; border-color:#3b82f6; }
        .flash { padding:.7rem 1rem; border-radius:8px; margin-bottom:1rem; font-size:.9rem; }
        .flash.danger { background:#fef2f2; color:#dc2626; }
        .actions { display:flex; gap:.75rem; margin-top:1.5rem; }
        .btn { padding:.65rem 1.2rem; border-radius:8px; border:none; font-size:.95rem; font-weight:600; cursor:pointer; }
        .btn-primary { background:#1e3a5f; color:#fff; }
        .btn-secondary { background:#f1f5f9; color:#475569; text-decoration:none; display:inline-flex; align-items:center; }
    </style>
</head>
<body>
<div class="card">
    <h2>{% if user %}Modifier l'utilisateur{% else %}Nouvel utilisateur{% endif %}</h2>
    {% if user %}<p class="subtitle">{{ user.email }}</p>{% endif %}

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
            <div class="flash {{ category }}">{{ message }}</div>
        {% endfor %}
    {% endwith %}

    <form method="POST">
        <div class="form-group">
            <label for="nom">Nom complet *</label>
            <input type="text" id="nom" name="nom" required
                   placeholder="Jean Dupont"
                   value="{{ user.nom if user else '' }}">
        </div>
        <div class="form-group">
            <label for="email">Email *</label>
            <input type="email" id="email" name="email" required
                   placeholder="jean.dupont@chantier.fr"
                   value="{{ user.email if user else '' }}">
        </div>
        <div class="form-group">
            <label for="password">
                Mot de passe
                {% if user %}<span class="label-hint">(laisser vide = inchangé)</span>{% else %}*{% endif %}
            </label>
            <input type="password" id="password" name="password"
                   {% if not user %}required{% endif %}
                   placeholder="{% if user %}Nouveau mot de passe…{% else %}Min. 8 caractères{% endif %}">
        </div>
        <div class="form-group">
            <label for="role">Rôle *</label>
            <select id="role" name="role">
                <option value="client" {% if user and user.role == 'client' %}selected{% endif %}>Client (technicien BTP)</option>
                <option value="admin"  {% if user and user.role == 'admin'  %}selected{% endif %}>Admin</option>
            </select>
        </div>
        <div class="form-group">
            <label for="client_id">Associer à un client</label>
            <select id="client_id" name="client_id">
                <option value="">— Aucun (admin uniquement) —</option>
                {% for c in clients %}
                    <option value="{{ c.id }}"
                        {% if user and user.client_id == c.id %}selected{% endif %}>
                        {{ c.nom }}{% if c.projet_label %} — {{ c.projet_label }}{% endif %}
                        {% if not c.actif %} (inactif){% endif %}
                    </option>
                {% endfor %}
            </select>
        </div>
        <div class="actions">
            <button type="submit" class="btn btn-primary">
                {% if user %}Enregistrer{% else %}Créer l'utilisateur{% endif %}
            </button>
            <a href="{{ url_for('admin.dashboard') }}" class="btn btn-secondary">Annuler</a>
        </div>
    </form>
</div>
</body>
</html>
