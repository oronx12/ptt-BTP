<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion — PTT BTP</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:#f0f4f8; }
        .login-card {
            background:#fff; border-radius:12px; box-shadow:0 4px 24px rgba(0,0,0,.12);
            padding:2.5rem 2rem; width:100%; max-width:400px;
        }
        .login-logo { text-align:center; margin-bottom:1.5rem; }
        .login-logo h1 { font-size:1.6rem; font-weight:800; color:#1e3a5f; margin:0; }
        .login-logo p  { color:#64748b; font-size:.9rem; margin:.25rem 0 0; }
        .form-group { margin-bottom:1.1rem; }
        .form-group label { display:block; font-size:.85rem; font-weight:600; color:#374151; margin-bottom:.4rem; }
        .form-group input {
            width:100%; padding:.65rem .9rem; border:1.5px solid #d1d5db;
            border-radius:8px; font-size:.95rem; box-sizing:border-box;
            transition:border-color .2s;
        }
        .form-group input:focus { outline:none; border-color:#3b82f6; }
        .remember { display:flex; align-items:center; gap:.5rem; font-size:.85rem; color:#6b7280; margin-bottom:1.2rem; }
        .btn-login {
            width:100%; padding:.75rem; background:#1e3a5f; color:#fff;
            border:none; border-radius:8px; font-size:1rem; font-weight:600;
            cursor:pointer; transition:background .2s;
        }
        .btn-login:hover { background:#0f2744; }
        .flash { padding:.7rem 1rem; border-radius:8px; margin-bottom:1rem; font-size:.9rem; }
        .flash.danger { background:#fef2f2; color:#dc2626; border:1px solid #fecaca; }
        .flash.info   { background:#eff6ff; color:#1d4ed8; border:1px solid #bfdbfe; }
        .flash.warning{ background:#fffbeb; color:#d97706; border:1px solid #fde68a; }
    </style>
</head>
<body>
<div class="login-card">
    <div class="login-logo">
        <h1>PTT BTP</h1>
        <p>Profils Topographiques Travers</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
            <div class="flash {{ category }}">{{ message }}</div>
        {% endfor %}
    {% endwith %}

    <form method="POST" action="{{ url_for('auth.login') }}">
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required autofocus
                   placeholder="votre@email.fr">
        </div>
        <div class="form-group">
            <label for="password">Mot de passe</label>
            <input type="password" id="password" name="password" required
                   placeholder="••••••••">
        </div>
        <label class="remember">
            <input type="checkbox" name="remember"> Rester connecté
        </label>
        <button type="submit" class="btn-login">Se connecter</button>
    </form>
</div>
</body>
</html>
