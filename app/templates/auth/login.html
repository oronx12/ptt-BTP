<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion — OPTILAB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: { DEFAULT: '#1e3a5f', dark: '#0f2744', light: '#2d5a8e' },
                        accent:  { DEFAULT: '#3b82f6', hover: '#2563eb' },
                    },
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
                    animation: { 'fade-in': 'fadeIn .45s ease' },
                    keyframes:  { fadeIn: { '0%': { opacity: '0', transform: 'translateY(18px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } } },
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body class="min-h-screen flex items-center justify-center p-4"
      style="background: linear-gradient(135deg, #0f1f38 0%, #1e3a5f 45%, #0d2645 100%);">

    <!-- Cercles décoratifs de fond -->
    <div class="absolute inset-0 overflow-hidden pointer-events-none">
        <div class="absolute -top-32 -right-32 w-80 h-80 rounded-full opacity-10"
             style="background: radial-gradient(circle, #3b82f6, transparent);"></div>
        <div class="absolute -bottom-32 -left-32 w-80 h-80 rounded-full opacity-10"
             style="background: radial-gradient(circle, #60a5fa, transparent);"></div>
        <div class="absolute top-1/3 right-1/4 w-48 h-48 rounded-full opacity-5"
             style="background: radial-gradient(circle, #93c5fd, transparent);"></div>
    </div>

    <div class="relative w-full max-w-md animate-fade-in">

        <!-- Card principale -->
        <div class="bg-white rounded-2xl shadow-2xl overflow-hidden">

            <!-- En-tête : identité de l'outil RECEPTA -->
            <div style="background: linear-gradient(135deg, #0d1f38 0%, #1e3a5f 60%, #2d5a8e 100%); padding: 32px 32px 28px; text-align:center;">

                <!-- Logo RECEPTA (grille de points + nom) -->
                <div style="display:inline-flex; align-items:center; gap:12px; margin-bottom:18px;">
                    <!-- Grille 2×2 points — identique au header de l'app -->
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:5px; width:28px; height:28px; flex-shrink:0;">
                        <span style="width:11px;height:11px;border-radius:50%;background:#00ffff;display:block;"></span>
                        <span style="width:11px;height:11px;border-radius:50%;background:#fbbf24;display:block;"></span>
                        <span style="width:11px;height:11px;border-radius:50%;background:#00ffff;display:block;"></span>
                        <span style="width:11px;height:11px;border-radius:50%;background:#00ffff;display:block;"></span>
                    </div>
                    <!-- Nom -->
                    <div style="text-align:left;">
                        <div style="color:#00ffff; font-size:1.7rem; font-weight:900; letter-spacing:0.12em; line-height:1; text-transform:uppercase;">RECEPTA</div>
                        <div style="color:rgba(255,255,255,0.35); font-size:0.62rem; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; margin-top:2px;">by OPTILAB</div>
                    </div>
                </div>

                <!-- Sous-titre de l'outil -->
                <div style="color:rgba(191,219,254,0.75); font-size:0.78rem; font-weight:500; letter-spacing:0.04em; margin-bottom:0;">
                    Réception Topographique
                </div>
            </div>

            <!-- Formulaire -->
            <div class="px-8 py-7">

                {% with messages = get_flashed_messages(with_categories=true) %}
                    {% for category, message in messages %}
                        <div class="mb-5 px-4 py-3 rounded-xl text-sm font-medium flex items-start gap-2
                            {% if category == 'danger' %}bg-red-50 text-red-700 border border-red-200
                            {% elif category == 'warning' %}bg-amber-50 text-amber-700 border border-amber-200
                            {% else %}bg-blue-50 text-blue-700 border border-blue-200{% endif %}">
                            <svg class="w-4 h-4 flex-shrink-0 mt-0.5" fill="currentColor" viewBox="0 0 20 20">
                                <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd"/>
                            </svg>
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endwith %}

                <p class="text-sm text-slate-500 mb-6 text-center font-medium">Connectez-vous à votre espace</p>

                <form method="POST" action="{{ url_for('auth.login') }}" class="space-y-5">

                    <div>
                        <label for="email" class="block text-sm font-semibold text-slate-700 mb-1.5">
                            Adresse email
                        </label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207"/>
                                </svg>
                            </div>
                            <input type="email" id="email" name="email" required autofocus
                                   placeholder="votre@email.fr"
                                   class="w-full pl-10 pr-4 py-3 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-accent focus:border-transparent transition bg-slate-50 focus:bg-white">
                        </div>
                    </div>

                    <div>
                        <label for="password" class="block text-sm font-semibold text-slate-700 mb-1.5">
                            Mot de passe
                        </label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                                </svg>
                            </div>
                            <input type="password" id="password" name="password" required
                                   placeholder="••••••••"
                                   class="w-full pl-10 pr-4 py-3 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-accent focus:border-transparent transition bg-slate-50 focus:bg-white">
                        </div>
                    </div>

                    <label class="flex items-center gap-2.5 cursor-pointer select-none">
                        <input type="checkbox" name="remember"
                               class="w-4 h-4 text-accent border-slate-300 rounded focus:ring-accent">
                        <span class="text-sm text-slate-600">Rester connecté</span>
                    </label>

                    <button type="submit"
                            class="w-full py-3.5 text-white font-semibold rounded-xl transition-all duration-200 hover:shadow-lg hover:-translate-y-0.5 active:translate-y-0 text-sm tracking-wide"
                            style="background: linear-gradient(135deg, #1e3a5f 0%, #2d5a8e 100%);">
                        Se connecter
                    </button>

                </form>
            </div>

            <!-- Pied de card -->
            <div class="px-8 py-4 border-t border-slate-100 text-center" style="background:#f8fafc;">
                <p class="text-xs text-slate-400" style="display:flex; align-items:center; justify-content:center; gap:6px;">
                    <!-- Mini logo dots -->
                    <span style="display:inline-grid; grid-template-columns:1fr 1fr; gap:2px; width:12px; height:12px; vertical-align:middle;">
                        <span style="width:4px;height:4px;border-radius:50%;background:#64748b;display:block;"></span>
                        <span style="width:4px;height:4px;border-radius:50%;background:#94a3b8;display:block;"></span>
                        <span style="width:4px;height:4px;border-radius:50%;background:#64748b;display:block;"></span>
                        <span style="width:4px;height:4px;border-radius:50%;background:#64748b;display:block;"></span>
                    </span>
                    RECEPTA &mdash; Usage professionnel exclusif
                </p>
            </div>
        </div>

        <!-- Mention suite en bas -->
        <p class="text-center mt-4" style="font-size:0.68rem; color:rgba(100,116,139,0.65); letter-spacing:0.05em;">
            <strong style="color:rgba(148,163,184,0.75); font-weight:700; letter-spacing:0.06em;">RECEPTA</strong>
            <span style="margin:0 6px; opacity:0.4;">·</span>
            Un outil de la suite <strong style="color:rgba(148,163,184,0.75); font-weight:700;">OPTILAB</strong>
        </p>
    </div>

</body>
</html>
